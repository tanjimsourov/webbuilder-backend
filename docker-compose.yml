version: "3.9"

services:
  backend:
    container_name: smc-backend
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./media:/app/media
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/', timeout=10)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  redis:
    container_name: smc-redis
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  celery:
    container_name: smc-celery
    build: .
    env_file:
      - .env
    command: celery -A config worker -l info
    depends_on:
      - redis
    volumes:
      - ./media:/app/media
    restart: unless-stopped

  # Uncomment to add Nginx for TLS termination.
