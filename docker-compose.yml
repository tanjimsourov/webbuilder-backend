version: "3.9"

x-app-build: &app-build
  context: .
  dockerfile: Dockerfile

x-app-env: &app-env
  DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
  DJANGO_RUN_MIGRATIONS: ${DJANGO_RUN_MIGRATIONS:-1}
  DJANGO_COLLECTSTATIC: ${DJANGO_COLLECTSTATIC:-1}
  DJANGO_WAIT_FOR_DB: ${DJANGO_WAIT_FOR_DB:-1}
  DJANGO_WAIT_FOR_CACHE: ${DJANGO_WAIT_FOR_CACHE:-1}
  DJANGO_STARTUP_MAX_WAIT_SECONDS: ${DJANGO_STARTUP_MAX_WAIT_SECONDS:-90}

services:
  backend:
    container_name: smc-backend
    build: *app-build
    env_file:
      - .env
    environment:
      <<: *app-env
    ports:
      - "8000:8000"
    volumes:
      - ./media:/app/media
      - ./var:/app/var
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
      minio:
        condition: service_started
      mailpit:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/ready/', timeout=10)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks: [platform]

  queue-worker:
    container_name: smc-queue-worker
    build: *app-build
    env_file:
      - .env
    environment:
      <<: *app-env
      DJANGO_RUN_MIGRATIONS: "0"
      DJANGO_COLLECTSTATIC: "0"
    command: celery -A config worker -l info --pool=solo
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./media:/app/media
      - ./var:/app/var
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "manage.py", "service_healthcheck", "--component", "worker", "--check-cache"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks: [platform]

  job-runner:
    container_name: smc-job-runner
    build: *app-build
    env_file:
      - .env
    environment:
      <<: *app-env
      DJANGO_RUN_MIGRATIONS: "0"
      DJANGO_COLLECTSTATIC: "0"
    command: python manage.py run_jobs --daemon --interval 5 --batch-size 20
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./media:/app/media
      - ./var:/app/var
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "manage.py", "service_healthcheck", "--component", "worker", "--check-cache"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks: [platform]

  scheduler:
    container_name: smc-scheduler
    build: *app-build
    env_file:
      - .env
    environment:
      <<: *app-env
      DJANGO_RUN_MIGRATIONS: "0"
      DJANGO_COLLECTSTATIC: "0"
    command: python manage.py run_scheduler --daemon --interval 60
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./media:/app/media
      - ./var:/app/var
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "manage.py", "service_healthcheck", "--component", "scheduler", "--check-cache"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks: [platform]

  redis:
    container_name: smc-redis
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks: [platform]

  postgres:
    container_name: smc-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-webbuilder}
      POSTGRES_USER: ${POSTGRES_USER:-webbuilder}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-webbuilder-password-change-me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-webbuilder} -d ${POSTGRES_DB:-webbuilder}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [platform]

  meilisearch:
    container_name: smc-meilisearch
    image: getmeili/meilisearch:v1.8
    restart: unless-stopped
    environment:
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:-}
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data
    networks: [platform]

  minio:
    container_name: smc-minio
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin-change-me}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks: [platform]

  mailpit:
    container_name: smc-mailpit
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks: [platform]

  nginx:
    container_name: smc-nginx
    image: nginx:1.27-alpine
    profiles: ["edge"]
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    restart: unless-stopped
    networks: [platform]

volumes:
  postgres_data:
  meili_data:
  minio_data:

networks:
  platform:
    driver: bridge
