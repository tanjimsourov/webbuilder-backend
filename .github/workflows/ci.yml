name: Backend CI

on:
  push:
  pull_request:

jobs:
  test-and-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: Django System Check
        run: python manage.py check

      - name: Django Deploy Check
        env:
          DJANGO_DEBUG: "false"
          DJANGO_SECRET_KEY: "0fS3VbYQXq1KpN8Jt2LrM7Wc9Ha4Dz5Uv6Ei0Rn3Qs8Ty1Op4Ak7"
          DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
          DJANGO_CORS_ALLOWED_ORIGINS: "https://localhost"
          DJANGO_CSRF_TRUSTED_ORIGINS: "https://localhost"
          DJANGO_PLATFORM_FRONTEND_ORIGINS: "https://localhost"
          DJANGO_AUTH_BOOTSTRAP_ENABLED: "false"
          DJANGO_AUTH_MAGIC_LOGIN_ENABLED: "false"
          DJANGO_METRICS_AUTH_TOKEN: "ci-metrics-token-1234567890"
          DJANGO_CACHE_URL: "redis://127.0.0.1:6379/1"
          LIBRECRAWL_ENABLED: "false"
          SERPBEAR_ENABLED: "false"
          UMAMI_ENABLED: "false"
          PAYLOAD_CMS_ENABLED: "false"
          PAYLOAD_ECOMMERCE_ENABLED: "false"
        run: python manage.py check --deploy --fail-level WARNING

      - name: Run Tests
        run: python manage.py test builder

      - name: Dependency Audit
        run: python -m pip_audit -r requirements.txt
