name: Backend CI

on:
  push:
  pull_request:

env:
  PYTHON_VERSION: "3.12"
  DJANGO_DEBUG: "true"
  DJANGO_SECRET_KEY: "ci-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.sha }}-temp-key-material"
  DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install pip-audit

      - name: Dependency integrity check
        run: python -m pip check

      - name: Lint
        run: python -m ruff check .

      - name: Type check (if configured)
        run: |
          if [ -f "mypy.ini" ] || [ -f ".mypy.ini" ] || [ -f "pyproject.toml" ]; then
            pip install mypy
            mypy . --ignore-missing-imports
          else
            echo "No mypy configuration detected; skipping type check."
          fi

      - name: Build validation
        run: python -m compileall analytics blog builder cms commerce config core domains email_hosting forms jobs notifications provider shared website

      - name: Dependency audit
        run: python -m pip_audit -r requirements.txt

  django-validation:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Django system check
        run: python manage.py check

      - name: Django deploy check
        env:
          DJANGO_DEBUG: "false"
          DJANGO_SECRET_KEY: "ci-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.sha }}-deploy-key-material"
          DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
          DJANGO_CORS_ALLOWED_ORIGINS: "https://localhost"
          DJANGO_CSRF_TRUSTED_ORIGINS: "https://localhost"
          DJANGO_PLATFORM_FRONTEND_ORIGINS: "https://localhost"
          DJANGO_AUTH_BOOTSTRAP_ENABLED: "false"
          DJANGO_AUTH_MAGIC_LOGIN_ENABLED: "false"
          DJANGO_ENABLE_ADMIN: "false"
          DJANGO_METRICS_AUTH_TOKEN: "ci-metrics-${{ github.run_id }}-${{ github.run_attempt }}-token-material-123456"
          DJANGO_CACHE_URL: "redis://127.0.0.1:6379/1"
          DJANGO_DB_ENGINE: "django.db.backends.postgresql"
          DJANGO_DB_NAME: "webbuilder"
          DJANGO_DB_USER: "webbuilder"
          DJANGO_DB_PASSWORD: "ci-db-${{ github.run_id }}-${{ github.run_attempt }}-password-material-123456"
          DJANGO_DB_HOST: "127.0.0.1"
          DJANGO_DB_PORT: "5432"
          LIBRECRAWL_ENABLED: "false"
          SERPBEAR_ENABLED: "false"
          UMAMI_ENABLED: "false"
          PAYLOAD_CMS_ENABLED: "false"
          PAYLOAD_ECOMMERCE_ENABLED: "false"
          DJANGO_METRICS_ALLOW_QUERY_TOKEN: "false"
          DJANGO_REDIRECT_ALLOWED_EXTERNAL_HOSTS: ""
          DJANGO_ALLOW_PRIVATE_WEBHOOK_TARGETS: "false"
        run: python manage.py check --deploy --fail-level WARNING

      - name: Migration drift check
        run: python scripts/check_migration_drift.py

      - name: Run test suite
        run: python manage.py test --verbosity 2

  container-build:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: webbuilder/backend:ci
