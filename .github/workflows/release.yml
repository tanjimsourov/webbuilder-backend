name: Release

on:
  push:
    branches: ["main", "master"]
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pull-requests: read

jobs:
  draft-release:
    if: github.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - name: Draft release notes
        uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag matches VERSION major/minor
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          FILE_VERSION="$(cat VERSION)"
          TAG_MM="$(echo "$TAG" | cut -d. -f1-2)"
          FILE_MM="$(echo "$FILE_VERSION" | cut -d. -f1-2)"
          if [ "$TAG_MM" != "$FILE_MM" ]; then
            echo "Tag major/minor ($TAG_MM) does not match VERSION ($FILE_MM)"
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/webbuilder-backend:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/webbuilder-backend:latest

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
